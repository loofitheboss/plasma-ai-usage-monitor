app-id: com.github.loofi.aiusagemonitor
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: plasmawindowed
finish-args:
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.kde.KWalletD6

modules:
  - name: plasma-ai-usage-monitor-plasmoid
    buildsystem: simple
    build-commands:
      - install -d /app/share/plasma/plasmoids/com.github.loofi.aiusagemonitor
      - cp -a package/. /app/share/plasma/plasmoids/com.github.loofi.aiusagemonitor/
    sources:
      - type: dir
        path: ../../
